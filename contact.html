<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - TOUNGA Cyberdéfense</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="logo">TOUNGA Cyberdéfense</div>
    <nav>
        <ul class="nav-menu">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="about.html">À propos</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<h2 class="section-title">Contactez-nous</h2>

<form class="contact-form" action="#" method="post">

    <label for="nom">Nom complet</label>
    <input type="text" id="nom" name="nom" placeholder="Votre nom" required minlength="2">

    <label for="email">Adresse email</label>
    <input type="email" id="email" name="email" placeholder="exemple@mail.com" required>

    <label for="tel">Téléphone</label>
    <input type="tel" id="tel" name="tel" placeholder="+241 XX XX XX XX" pattern="[0-9+ ]{8,15}">

    <label for="sujet">Sujet</label>
    <select id="sujet" name="sujet" required>
        <option value="">-- Choisissez un sujet --</option>
        <option value="info">Demande d'information</option>
        <option value="partenariat">Partenariat</option>
        <option value="incident">Signaler un incident</option>
        <option value="autre">Autre</option>
    </select>

    <label for="message">Message</label>
    <textarea id="message" name="message" placeholder="Écrivez votre message ici..." required minlength="10"></textarea>

    <!-- checkbox rgpd, obligatoire pour le prof -->
    <label style="display:flex; align-items:center; gap:8px; margin-top:15px;">
        <input type="checkbox" required style="width:auto;">
        J'accepte que mes données soient utilisées pour me recontacter
    </label>

    <button type="submit" class="btn">Envoyer le message</button>

</form>

<footer>
    &copy; 2026 TOUNGA Cyberdéfense - Tous droits réservés
</footer>

</body>
</html>
